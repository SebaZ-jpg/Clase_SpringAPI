<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LÆSE — Galería de Relojes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 5rem;
            letter-spacing: 0.4em;
            color: #d4af37;
            margin-bottom: 0.5rem;
        }
        .subtitulo {
            letter-spacing: 0.2em;
            color: #888;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
        }
        .btn-entrar {
            background-color: #d4af37;
            color: #0a0a0a;
            font-weight: bold;
            letter-spacing: 0.2em;
            padding: 14px 50px;
            border: none;
            border-radius: 0;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .btn-entrar:hover {
            background-color: #f5f5f5;
            color: #0a0a0a;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<h1>LÆSE</h1>
<p class="subtitulo">GALERÍA DE RELOJES DE ALTA GAMA</p>
<a href="/galeria" class="btn btn-entrar">ENTRAR A LA GALERÍA</a>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
